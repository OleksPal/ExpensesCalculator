<div class="card border-primary dark-blue-1 text-white">
    <img [src]="imageSrc" class="card-img-top" [alt]="translationKey | translate">
    <div class="card-body" style="border-top: 1px solid rgba(255,255,255,0.1);">
        <p class="card-text">
            {{ translationKey | translate }}
        </p>
    </div>
</div>
