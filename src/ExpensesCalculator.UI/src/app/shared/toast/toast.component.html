<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 2000;">
  <div *ngIf="toast"
       class="toast toast-dark"
       [class.show]="toast.show"
       role="alert"
       aria-live="assertive"
       aria-atomic="true">
    <div class="toast-header" [ngClass]="getStatusClass()">
      <strong class="me-auto">{{ toast.header }}</strong>
      <small>{{ toast.timestamp }}</small>
      <button type="button" class="btn-close btn-close-white" (click)="hide()" aria-label="Close"></button>
    </div>
    <div class="toast-body bg-dark text-white">
      {{ toast.message }}
    </div>
  </div>
</div>
